name: sica-engine
on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]
jobs:
  guardrail-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sica
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: "install test deps"
        run: pip install pytest
      - name: "guardrail + machinery suite (audit, isolation, budget, gate, memory)"
        run: python -m pytest tests -q
      - name: "benchmark integrity (fail-to-pass transition for every task)"
        run: python3 sica.py validate-bench --profile smoke || true
      - name: "grading-asset containment (T1 reachability + hash-lock)"
        run: python3 sica.py leakscan
      - name: "pins + isolation status"
        run: python3 sica.py pin --profile smoke
